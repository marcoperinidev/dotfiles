[colors]
bg = #2E3440
bg-alt = #3B4252
fg = #D8DEE9
fg-alt = #4C566A
blue = #81A1C1
lblue = #88C0D0
green = #A3BE8C
red = #BF616A
yellow = #EBCB8B

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
radius = 0
background = ${colors.bg}
foreground = ${colors.fg}
border-bottom-size = 2
border-bottom-color = ${colors.blue}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=14;3
; tray a sinistra delle icone sistema
tray-position = right
tray-padding = 3
tray-background = ${colors.bg}

modules-left = i3
modules-center = date
modules-right = stats-sep wifi bluetooth sys-sep volume cpu memory battery sys-sep

[module/stats-sep]
type = custom/text
content = " | "
content-foreground = ${colors.separator}

[module/sys-sep]
type = custom/text
content = " | "
content-foreground = ${colors.separator}

; ==================
; STATS
; ==================
[module/memory]
type = internal/memory
interval = 2
label = 蟀崨 %percentage_used%%
label-foreground = ${colors.green}

[module/cpu]
type = internal/cpu
interval = 2
label = 蟀粻 %percentage%%
label-foreground = ${colors.yellow}

[module/volume]
type = internal/pulseaudio
label-volume = 蟀暰 %percentage%%
label-volume-foreground = ${colors.lblue}
label-muted = 蟀潫
label-muted-foreground = ${colors.fg-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
interval = 30

label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.yellow}
label-full = 蟀伖 100%
label-full-foreground = ${colors.green}

; icona cambia in base alla percentuale scarica
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = 蟀伜
ramp-capacity-1 = 蟀伝
ramp-capacity-2 = 蟀伡
ramp-capacity-3 = 蟀伣
ramp-capacity-4 = 蟀伨
ramp-capacity-5 = 蟀伩
ramp-capacity-6 = 蟀個
ramp-capacity-7 = 蟀倎
ramp-capacity-8 = 蟀倐
ramp-capacity-9 = 蟀伖
ramp-capacity-foreground = ${colors.yellow}

; ==================
; SISTEMA
; ==================
[module/wifi]
type = internal/network
interface-type = wireless
interval = 3
label-connected = 蟀え %essid%
label-connected-foreground = ${colors.green}
label-disconnected =

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep "Powered: yes" > /dev/null && echo "蟀偗" || echo ""
interval = 5
label-foreground = ${colors.blue}

; ==================
; WORKSPACES + DATA
; ==================
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.lblue}
label-focused-background = ${colors.bg-alt}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-alt}
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %d-%m-%Y
time = %H:%M:%S
label = 蟀 %date% %time%
label-foreground = ${colors.lblue}
