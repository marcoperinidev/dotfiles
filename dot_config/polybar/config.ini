[colors]
bg = #2E3440
bg-alt = #3B4252
fg = #D8DEE9
fg-alt = #4C566A
blue = #81A1C1
lblue = #88C0D0
green = #A3BE8C
red = #BF616A
yellow = #EBCB8B

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
radius = 0
background = ${colors.bg}
foreground = ${colors.fg}
border-bottom-size = 2
border-bottom-color = ${colors.blue}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=14;3
; tray a sinistra delle icone sistema
tray-position = right
tray-padding = 3
tray-background = ${colors.bg}

modules-left = i3
modules-center = date
modules-right = stats-sep wifi eth bluetooth sys-sep volume cpu memory battery sys-sep

[module/stats-sep]
type = custom/text
content = " | "
content-foreground = ${colors.separator}

[module/sys-sep]
type = custom/text
content = " | "
content-foreground = ${colors.separator}

; ==================
; STATS
; ==================
[module/memory]
type = internal/memory
interval = 2
label = 󰍛 %percentage_used%%
label-foreground = ${colors.green}

[module/cpu]
type = internal/cpu
interval = 2
label = 󰻠 %percentage%%
label-foreground = ${colors.yellow}

[module/volume]
type = internal/pulseaudio
label-volume = 󰕾 %percentage%%
label-volume-foreground = ${colors.lblue}
label-muted = 󰝟
label-muted-foreground = ${colors.fg-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
interval = 30

label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.yellow}
label-full = 󰁹 100%
label-full-foreground = ${colors.green}

; icona cambia in base alla percentuale scarica
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹
ramp-capacity-foreground = ${colors.yellow}

; ==================
; SISTEMA
; ==================
[module/wifi]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <label-connected>
label-connected = 󰤨 %essid%
label-connected-foreground = ${colors.green}

format-disconnected =
label-disconnected =

[module/eth]
type = internal/network
interface = eth0
interval = 3

format-connected = <label-connected>
label-connected = 󰈀 %local_ip%
label-connected-foreground = ${colors.green}

format-disconnected =
label-disconnected =

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep "Powered: yes" > /dev/null && echo "󰂯" || echo ""
interval = 5
label-foreground = ${colors.blue}

; ==================
; WORKSPACES + DATA
; ==================
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.lblue}
label-focused-background = ${colors.bg-alt}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-alt}
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %d-%m-%Y
time = %H:%M:%S
label = 󰥔 %date% %time%
label-foreground = ${colors.lblue}
