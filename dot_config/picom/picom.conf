backend = "glx";
vsync = true;

# Rounded corners
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Shadows
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Blur (opzionale, un po' pesante)
blur-method = "dual_kawase";
blur-strength = 4;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "_GTK_FRAME_EXTENTS@",
  "fullscreen"
];

# Fade
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Opacity
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

